<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canon Studio Pro - Versiune Finală</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --accent: #00ff88; }
        body { background: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* Containerul pentru TV / HDMI */
        .viewport { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #000;
        }

        /* Video forțat să umple ecranul fără margini */
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        /* Panoul lateral */
        .sidebar { 
            position: absolute; 
            top: 0; left: 0; 
            width: 300px; height: 100%; 
            background: rgba(15, 15, 15, 0.95); 
            padding: 20px; 
            transition: transform 0.3s ease; 
            z-index: 2000;
            overflow-y: auto;
            border-right: 2px solid var(--accent);
            box-sizing: border-box;
        }
        .sidebar.hidden { transform: translateX(-300px); }
        
        /* Butonul de SETĂRI care rămâne vizibil în Full Screen */
        #toggleMenu { 
            position: fixed; 
            bottom: 15px; left: 15px; 
            z-index: 3000; 
            background: var(--accent); color: black; 
            border: none; padding: 12px 18px; 
            border-radius: 6px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 15px rgba(0,0,0,1);
        }

        .card { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
        h3 { font-size: 11px; color: var(--accent); margin: 0 0 12px 0; text-transform: uppercase; letter-spacing: 1px; }
        
        #countdown { 
            position: absolute; 
            font-size: 280px; 
            font-weight: bold; 
            color: var(--accent); 
            z-index: 1500; 
            text-shadow: 0 0 60px black; 
            pointer-events: none; 
            display: none; 
        }

        input[type="range"] { width: 100%; margin-top: 10px; cursor: pointer; }
        .btn-main { width: 100%; padding: 15px; font-weight: bold; cursor: pointer; border: none; border-radius: 6px; margin-top: 10px; }
        label { font-size: 13px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="viewport" id="mainArea">
    <button id="toggleMenu">⚙️ SETĂRI / MENIU</button>
    <div id="countdown">3</div>
    
    <div class="sidebar" id="sidebar">
        <div class="card">
            <h3>1. SURSĂ FOTO (DSLR)</h3>
            <select id="camSelect" style="width:100%; background:#000; color:white; padding:8px; border: 1px solid #444;"></select>
            <button id="startBtn" class="btn-main" style="background:#333; color:white;">START LIVE VIEW</button>
        </div>

        <div class="card">
            <h3>2. TELECOMANDĂ</h3>
            <div id="remoteStatus" style="color: #00ff88; font-size: 12px; font-weight:bold;">STATUS: CONECTATĂ ✅</div>
        </div>

        <div class="card">
            <h3>3. TIMER CAPTURĂ</h3>
            <div style="display: flex; align-items: center; gap: 10px;">
                <label>Activare Timer:</label>
                <input type="checkbox" id="timerEnabled" style="width: 20px; height: 20px;">
            </div>
            
            <div id="timerControls" style="margin-top:15px; border-top: 1px solid #333; padding-top: 10px;">
                <label>Secunde: <span id="secVal" style="color:var(--accent); font-weight:bold;">3</span></label>
                <input type="range" id="timerSecs" min="1" max="5" value="3">
            </div>
        </div>

        <div class="card">
            <h3>4. REGLAJE IMAGINE</h3>
            <label>Luminozitate</label>
            <input type="range" id="br" min="0" max="200" value="100">
            <label style="margin-top:15px;">Contrast</label>
            <input type="range" id="ct" min="50" max="150" value="100">
        </div>

        <button id="capBtn" class="btn-main" style="background:var(--accent); color:black; font-size: 16px;">FĂ POZA (SPACE)</button>
        <button id="fullScreenBtn" class="btn-main" style="background:#222; color:white; border: 1px solid #444;">MOD FULL SCREEN</button>
    </div>

    <video id="video" autoplay playsinline></video>
</div>

<canvas id="procCanvas" style="display:none;"></canvas>

<script>
    const v = document.getElementById('video'), sidebar = document.getElementById('sidebar');
    const timerEnabled = document.getElementById('timerEnabled'), timerSecs = document.getElementById('timerSecs'), secVal = document.getElementById('secVal');
    const countdown = document.getElementById('countdown');
    const brInput = document.getElementById('br'), ctInput = document.getElementById('ct');

    // 1. Telecomanda PeerJS
    const peer = new Peer('djcioko_canon_booth_2026_xyz');
    peer.on('connection', (conn) => {
        conn.on('data', (data) => { if(data === 'SNAP') startCapture(); });
    });

    // 2. Meniu și Tasta Space
    document.getElementById('toggleMenu').onclick = () => sidebar.classList.toggle('hidden');
    
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
            e.preventDefault();
            startCapture();
        }
    });

    document.getElementById('fullScreenBtn').onclick = () => {
        if (!document.fullscreenElement) document.getElementById('mainArea').requestFullscreen();
        else document.exitFullscreen();
    };

    // 3. Logică Timer
    timerSecs.oninput = () => { 
        secVal.innerText = timerSecs.value; 
    };

    function startCapture() {
        if (timerEnabled.checked) {
            let count = parseInt(timerSecs.value);
            countdown.style.display = 'block';
            countdown.innerText = count;
            let interval = setInterval(() => {
                count--;
                if(count > 0) countdown.innerText = count;
                else { 
                    clearInterval(interval); 
                    countdown.style.display = 'none'; 
                    takePhoto(); 
                }
            }, 1000);
        } else {
            takePhoto();
        }
    }

    // 4. Salvare Automată (Fără margini negre, rezoluție mare)
    function takePhoto() {
        const can = document.getElementById('procCanvas');
        const ctx = can.getContext('2d');
        
        // Forțăm 16:9 la rezoluție mare pentru a tăia marginile DSLR-ului
        can.width = 3840; 
        can.height = 2160;

        ctx.filter = v.style.filter;
        
        // Desenează imaginea pe tot canvas-ul (Stretch/Fill)
        ctx.drawImage(v, 0, 0, can.width, can.height);
        
        const link = document.createElement('a');
        link.download = `Canon_Photo_${Date.now()}.png`;
        link.href = can.toDataURL('image/png', 1.0);
        link.click();
    }

    document.getElementById('capBtn').onclick = startCapture;

    // Filtre și Reținere setări (LocalStorage)
    const applyFX = () => {
        v.style.filter = `brightness(${brInput.value}%) contrast(${ctInput.value}%)`;
        localStorage.setItem('booth_br', brInput.value);
        localStorage.setItem('booth_ct', ctInput.value);
    };
    brInput.oninput = applyFX;
    ctInput.oninput = applyFX;

    async function init() {
        // Încarcă setările vechi
        if(localStorage.getItem('booth_br')) brInput.value = localStorage.getItem('booth_br');
        if(localStorage.getItem('booth_ct')) ctInput.value = localStorage.getItem('booth_ct');
        applyFX();

        const devs = await navigator.mediaDevices.enumerateDevices();
        const cams = devs.filter(d => d.kind === 'videoinput');
        document.getElementById('camSelect').innerHTML = cams.map((c, i) => `<option value="${c.deviceId}">${c.label || 'Camera '+(i+1)}</option>`).join('');
    }
    
    document.getElementById('startBtn').onclick = async () => {
        const s = await navigator.mediaDevices.getUserMedia({
            video: {
                deviceId: {exact: document.getElementById('camSelect').value},
                width: { ideal: 1920 },
                height: { ideal: 1080 }
            }
        });
        v.srcObject = s;
    };
    init();
</script>
</body>
</html>
