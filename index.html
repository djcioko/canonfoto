<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canon Monitor - Pro</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; }
        .sidebar { width: 250px; background: #111; padding: 15px; border-right: 1px solid #333; z-index: 100; }
        .main { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        video { max-width: 100%; max-height: 100%; transform: scaleX(1); } /* Schimbă la -1 dacă vrei oglindă */
        
        .card { background: #222; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        h3 { font-size: 10px; color: #00ff88; text-transform: uppercase; margin: 0 0 10px 0; }
        select, .btn { width: 100%; padding: 12px; margin-top: 5px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .btn-start { background: #00ff88; color: #000; }
        .btn-capture { background: #ff4757; color: #fff; margin-top: 20px; font-size: 16px; }
        
        /* Efecte de imagine (CSS pur, nu blochează procesorul) */
        #v-container { position: relative; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="card">
        <h3>1. SURSA VIDEO</h3>
        <select id="camSelect" style="background:#333; color:white;"></select>
        <button id="startBtn" class="btn btn-start">PORNEȘTE CAMERA</button>
    </div>

    <div class="card">
        <h3>2. AJUSTARE (REAL-TIME)</h3>
        <label style="font-size:10px;">Luminozitate</label>
        <input type="range" id="br" min="0" max="200" value="100" style="width:100%">
        <label style="font-size:10px;">Contrast</label>
        <input type="range" id="ct" min="50" max="150" value="100" style="width:100%">
    </div>

    <button id="capBtn" class="btn btn-capture">SALVEAZĂ POZA</button>
    <p id="status" style="font-size:10px; color:#666; text-align:center; margin-top:10px;">Conectați HDMI Capture Card</p>
</div>

<div class="main">
    <div id="v-container">
        <video id="video" autoplay playsinline></video>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const v = document.getElementById('video');
    const sel = document.getElementById('camSelect');
    const btn = document.getElementById('startBtn');
    const cap = document.getElementById('capBtn');
    const can = document.getElementById('canvas');

    // 1. Găsește camerele (Inclusiv USB)
    async function init() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const cams = devices.filter(d => d.kind === 'videoinput');
        sel.innerHTML = cams.map((c, i) => `<option value="${c.deviceId}">${c.label || 'Camera ' + (i+1)}</option>`).join('');
    }

    // 2. Pornește imaginea (Fără AI, doar video pur)
    btn.onclick = async () => {
        if (v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
        
        const constraints = {
            video: { 
                deviceId: { exact: sel.value },
                width: { ideal: 1920 },
                height: { ideal: 1080 }
            }
        };

        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            v.srcObject = stream;
            document.getElementById('status').innerText = "Camera Activă!";
        } catch (e) {
            alert("Eroare la pornire. Încearcă altă cameră din listă.");
        }
    };

    // 3. Aplică filtrele CSS (Sunt mult mai rapide)
    function updateFilters() {
        v.style.filter = `brightness(${document.getElementById('br').value}%) contrast(${document.getElementById('ct').value}%)`;
    }
    document.getElementById('br').oninput = updateFilters;
    document.getElementById('ct').oninput = updateFilters;

    // 4. Salvează poza
    cap.onclick = () => {
        can.width = v.videoWidth;
        can.height = v.videoHeight;
        const ctx = can.getContext('2d');
        // Aplicăm filtrele și pe poză
        ctx.filter = v.style.filter;
        ctx.drawImage(v, 0, 0, can.width, can.height);
        
        const link = document.createElement('a');
        link.download = `Canon_Foto_${Date.now()}.png`;
        link.href = can.toDataURL('image/png');
        link.click();
    };

    // Cerem permisiune la start ca să vedem numele camerelor
    navigator.mediaDevices.getUserMedia({video: true}).then(init);
</script>

</body>
</html>
