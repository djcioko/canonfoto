<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canon Studio - Select Sursă</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
    <style>
        :root { --accent: #00ff88; --bg: #000; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background: #111; padding: 15px; border-right: 1px solid #333; z-index: 10; overflow-y: auto; }
        .main-view { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        canvas { max-width: 100%; max-height: 100%; border: 1px solid #333; }
        .card { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; }
        h3 { font-size: 11px; color: var(--accent); margin: 0 0 10px 0; text-transform: uppercase; }
        select, input[type="range"], .btn { width: 100%; margin: 8px 0; display: block; }
        .btn { padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; background: var(--accent); color: black; font-size: 14px; }
        .btn-scan { background: #444; color: white; padding: 10px; font-size: 11px; }
        label { font-size: 10px; color: #888; display: block; margin-top: 5px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="card">
        <h3>1. SELECTARE CANON (USB)</h3>
        <button id="scanBtn" class="btn btn-scan">PAS 1: CAUTĂ CAMERE</button>
        <label>Alege sursa video:</label>
        <select id="camList" style="background:#000; color:white; padding:10px; border:1px solid var(--accent);"></select>
        <button id="startBtn" class="btn">PAS 2: PORNEȘTE VIDEO</button>
    </div>

    <div class="card">
        <h3>2. AJUSTĂRI IMAGINE</h3>
        <label>Luminozitate</label>
        <input type="range" id="bright" min="0" max="200" value="100">
        <label>Saturație</label>
        <input type="range" id="sat" min="0" max="200" value="100">
        <label>Contrast</label>
        <input type="range" id="cont" min="50" max="150" value="100">
    </div>

    <div class="card">
        <h3>3. FUNDAL AI</h3>
        <select id="bgType">
            <option value="none">Fără (Camera Originală)</option>
            <option value="image">Înlocuiește Fundalul</option>
        </select>
        <input type="file" id="bgFile" accept="image/*" style="font-size:10px;">
    </div>

    <button id="capBtn" class="btn" style="background:#ff4757; color:white;">SALVEAZĂ POZA</button>
</div>

<div class="main-view"><canvas id="out"></canvas></div>
<video id="v" autoplay playsinline style="display:none"></video>
<img id="bg_img" style="display:none">

<script>
    const video = document.getElementById('v'), canvas = document.getElementById('out'), ctx = canvas.getContext('2d'), bgImg = document.getElementById('bg_img');
    const camList = document.getElementById('camList');
    let stream = null;

    // --- FUNCȚIA DE DETECTARE ---
    async function findCameras() {
        try {
            // Cerem accesul pentru a vedea numele camerelor
            const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
            const devices = await navigator.mediaDevices.enumerateDevices();
            
            camList.innerHTML = '';
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            
            videoDevices.forEach((device, i) => {
                const opt = document.createElement('option');
                opt.value = device.deviceId;
                // Dacă label-ul e gol, îi dăm un nume generic
                opt.text = device.label || `Camera USB / Externă ${i + 1}`;
                camList.appendChild(opt);
            });

            // Oprim stream-ul temporar
            tempStream.getTracks().forEach(t => t.stop());
            
            // Sugestie: Selectăm ultima cameră (de obicei USB)
            if(camList.options.length > 1) camList.selectedIndex = camList.options.length - 1;
            
            alert("Camere găsite: " + videoDevices.length + "\nSelectează sursa USB din listă!");
        } catch (e) {
            alert("Eroare: Trebuie să permiți accesul la cameră!");
        }
    }

    // --- PORNIRE ---
    async function startVideo() {
        if(stream) stream.getTracks().forEach(t => t.stop());
        
        const constraints = {
            video: { 
                deviceId: { exact: camList.value },
                width: { ideal: 1920 },
                height: { ideal: 1080 }
            }
        };

        try {
            stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            beginAI();
        } catch (e) {
            // Fallback rezoluție standard
            stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: camList.value } } });
            video.srcObject = stream;
            beginAI();
        }
    }

    const ai = new SelfieSegmentation({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}`});
    ai.setOptions({ modelSelection: 1 });
    ai.onResults((res) => {
        canvas.width = 1920; canvas.height = 1080;
        ctx.save();
        ctx.filter = `brightness(${document.getElementById('bright').value}%) saturate(${document.getElementById('sat').value}%) contrast(${document.getElementById('cont').value}%)`;
        
        if (document.getElementById('bgType').value === 'image' && bgImg.src && res.segmentationMask) {
            ctx.drawImage(bgImg, 0, 0, 1920, 1080);
            const tmp = document.createElement('canvas'); tmp.width = 1920; tmp.height = 1080;
            const tCtx = tmp.getContext('2d');
            tCtx.drawImage(res.image, 0, 0, 1920, 1080);
            tCtx.globalCompositeOperation = 'destination-in';
            tCtx.drawImage(res.segmentationMask, 0, 0, 1920, 1080);
            ctx.drawImage(tmp, 0, 0);
        } else {
            ctx.drawImage(video, 0, 0, 1920, 1080);
        }
        ctx.restore();
    });

    function beginAI() { if(video.readyState >= 2) ai.send({image:video}); requestAnimationFrame(beginAI); }

    document.getElementById('scanBtn').onclick = findCameras;
    document.getElementById('startBtn').onclick = startVideo;
    document.getElementById('bgFile').onchange = (e) => { bgImg.src = URL.createObjectURL(e.target.files[0]); };
    document.getElementById('capBtn').onclick = () => {
        const a = document.createElement('a');
        a.download = `CanonFoto_${Date.now()}.png`;
        a.href = canvas.toDataURL("image/png");
        a.click();
    };
    
    // Dublu click pentru a ascunde meniul
    canvas.ondblclick = () => document.getElementById('sidebar').classList.toggle('hidden');

    // Scanăm la pornire
    window.onload = findCameras;
</script>
</body>
</html>
