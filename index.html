<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canon Studio Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --accent: #00ff88; }
        body { background: #000; color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 280px; background: #111; padding: 15px; border-right: 1px solid #333; overflow-y: auto; transition: 0.3s; z-index: 100; }
        .sidebar.hidden { margin-left: -280px; }
        
        #toggleMenu { position: fixed; bottom: 20px; left: 20px; z-index: 999; background: var(--accent); color: black; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        .main { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; background: #000; }
        
        /* REPARAȚIE CADRU: Eliminat scaleX(-1) și asigurat aspect ratio */
        video { 
            max-width: 95%; 
            max-height: 95%; 
            box-shadow: 0 0 20px rgba(0,255,136,0.2);
            object-fit: contain;
        }
        
        .card { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; }
        h3 { font-size: 10px; color: var(--accent); margin: 0 0 10px 0; text-transform: uppercase; }
        
        #countdown { position: absolute; font-size: 200px; font-weight: bold; color: var(--accent); z-index: 500; display: none; text-shadow: 0 0 30px black; }
        .btn-fs { background: rgba(255,255,255,0.1); color: white; border: 1px solid #444; padding: 10px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<button id="toggleMenu">SETĂRI</button>
<div id="countdown">3</div>

<div class="sidebar" id="sidebar">
    <div class="card">
        <h3>1. APARAT FOTO</h3>
        <select id="camSelect" style="width:100%; background:#000; color:white; padding:5px;"></select>
        <button id="startBtn" style="width:100%; margin-top:10px; cursor:pointer;">START LIVE</button>
    </div>

    <div class="card">
        <h3>2. TELECOMANDĂ</h3>
        <div id="remoteStatus" style="color: #ff4757; font-size: 11px; font-weight:bold;">STARE: DECONECTATĂ</div>
    </div>

    <div class="card">
        <h3>3. TIMER CAPTURĂ</h3>
        <label style="font-size:12px;">Activare Timer:</label>
        <input type="checkbox" id="timerActive" checked>
        <br><br>
        <label style="font-size:12px;">Secunde: <span id="secVal">3</span></label>
        <input type="range" id="timerSecs" min="1" max="5" value="3" style="width:100%;">
    </div>

    <div class="card">
        <h3>4. IMAGINE</h3>
        <label style="font-size:10px;">Luminos.</label>
        <input type="range" id="br" min="0" max="200" value="100" style="width:100%;">
        <label style="font-size:10px;">Contrast</label>
        <input type="range" id="ct" min="50" max="150" value="100" style="width:100%;">
    </div>

    <button id="capBtn" style="width:100%; padding:20px; background:var(--accent); font-weight:bold; border:none; cursor:pointer; border-radius:8px;">FĂ POZA (SNAP)</button>
    <button id="fullScreenBtn" class="btn-fs" style="margin-top:10px; width:100%;">FULL SCREEN</button>
</div>

<div class="main" id="mainArea">
    <video id="video" autoplay playsinline></video>
</div>

<canvas id="procCanvas" style="display:none;"></canvas>

<script>
    const v = document.getElementById('video'), sidebar = document.getElementById('sidebar');
    const timerSecs = document.getElementById('timerSecs'), secVal = document.getElementById('secVal');
    const countdown = document.getElementById('countdown');
    const brInput = document.getElementById('br'), ctInput = document.getElementById('ct');

    // --- REȚINERE SETĂRI (Conform cerinței tale) ---
    function loadSettings() {
        if(localStorage.getItem('booth_br')) brInput.value = localStorage.getItem('booth_br');
        if(localStorage.getItem('booth_ct')) ctInput.value = localStorage.getItem('booth_ct');
        if(localStorage.getItem('booth_timer')) timerSecs.value = localStorage.getItem('booth_timer');
        secVal.innerText = timerSecs.value;
        applyFilters();
    }

    function saveSettings() {
        localStorage.setItem('booth_br', brInput.value);
        localStorage.setItem('booth_ct', ctInput.value);
        localStorage.setItem('booth_timer', timerSecs.value);
    }

    // --- TELECOMANDĂ ---
    const PEER_ID = 'djcioko_canon_booth_2026_xyz'; 
    const peer = new Peer(PEER_ID);
    peer.on('connection', (conn) => {
        document.getElementById('remoteStatus').innerText = "STARE: CONECTATĂ";
        document.getElementById('remoteStatus').style.color = "#00ff88";
        conn.on('data', (data) => { if(data === 'SNAP') startCapture(); });
    });

    // --- UI CONTROLS ---
    document.getElementById('toggleMenu').onclick = () => sidebar.classList.toggle('hidden');
    document.getElementById('fullScreenBtn').onclick = () => {
        const elem = document.getElementById('mainArea');
        if (elem.requestFullscreen) elem.requestFullscreen();
    };

    timerSecs.oninput = () => {
        secVal.innerText = timerSecs.value;
        saveSettings();
    };

    function applyFilters() {
        v.style.filter = `brightness(${brInput.value}%) contrast(${ctInput.value}%)`;
        saveSettings();
    }
    brInput.oninput = applyFilters;
    ctInput.oninput = applyFilters;

    // --- LOGICĂ CAPTURĂ ---
    function startCapture() {
        if(document.getElementById('timerActive').checked) {
            let count = parseInt(timerSecs.value);
            countdown.style.display = 'block';
            countdown.innerText = count;
            let interval = setInterval(() => {
                count--;
                if(count > 0) countdown.innerText = count;
                else { clearInterval(interval); countdown.style.display = 'none'; takePhoto(); }
            }, 1000);
        } else {
            takePhoto();
        }
    }

    function takePhoto() {
        const can = document.getElementById('procCanvas');
        can.width = v.videoWidth; can.height = v.videoHeight;
        const ctx = can.getContext('2d');
        ctx.filter = v.style.filter;
        ctx.drawImage(v, 0, 0);
        
        const link = document.createElement('a');
        link.download = `Canon_Photo_${Date.now()}.png`;
        link.href = can.toDataURL('image/png');
        link.click();
    }

    document.getElementById('capBtn').onclick = startCapture;

    // --- INITIALIZARE CAMERĂ ---
    async function init() {
        loadSettings();
        const devs = await navigator.mediaDevices.enumerateDevices();
        const cams = devs.filter(d => d.kind === 'videoinput');
        document.getElementById('camSelect').innerHTML = cams.map((c, i) => `<option value="${c.deviceId}">${c.label || 'Camera '+(i+1)}</option>`).join('');
    }

    document.getElementById('startBtn').onclick = async () => {
        const constraints = {
            video: {
                deviceId: { exact: document.getElementById('camSelect').value },
                width: { ideal: 1920 },
                height: { ideal: 1080 }
            }
        };
        const s = await navigator.mediaDevices.getUserMedia(constraints);
        v.srcObject = s;
        applyFilters();
    };

    init();
</script>
</body>
</html>
