<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canon Studio Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
    <style>
        :root { --accent: #2ed573; --bg: #000; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: #111; padding: 15px; border-right: 1px solid #333; z-index: 10; overflow-y: auto; }
        .main-view { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        canvas { max-width: 100%; max-height: 100%; border: 1px solid #222; }
        .card { background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; }
        h3 { font-size: 10px; color: var(--accent); margin: 0 0 8px 0; text-transform: uppercase; }
        select, input[type="range"], .btn { width: 100%; margin: 5px 0; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; background: var(--accent); color: black; }
        .btn-refresh { background: #444; color: white; margin-bottom: 10px; }
        .hidden { display: none !important; }
        label { font-size: 9px; color: #888; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="card">
        <h3>1. Sursă HDMI (USB)</h3>
        <button id="btnScan" class="btn btn-refresh">1. DETECTEAZĂ CAMERE</button>
        <select id="camSelect" style="background:#000; color:white; padding:10px; border:1px solid #444;"></select>
        <button id="btnStart" class="btn">2. PORNEȘTE CANON</button>
    </div>

    <div class="card">
        <h3>2. Ajustări Imagine</h3>
        <label>Luminozitate</label>
        <input type="range" id="bright" min="0" max="200" value="100">
        <label>Saturație</label>
        <input type="range" id="sat" min="0" max="200" value="100">
        <label>Contrast</label>
        <input type="range" id="cont" min="50" max="150" value="100">
    </div>

    <div class="card">
        <h3>3. Fundal (AI)</h3>
        <select id="bgType">
            <option value="none">Fără Fundal</option>
            <option value="image">Fundal Imagine</option>
        </select>
        <input type="file" id="bgFile" accept="image/*" style="font-size:9px;">
    </div>

    <button id="btnCapture" class="btn" style="background:#ff4757; color:white;">SALVEAZĂ POZA</button>
</div>

<div class="main-view">
    <canvas id="out"></canvas>
</div>

<video id="v" autoplay playsinline style="display:none"></video>
<img id="bg_img" style="display:none">

<script>
    const video = document.getElementById('v'), canvas = document.getElementById('out'), ctx = canvas.getContext('2d'), bgImg = document.getElementById('bg_img');
    const camSelect = document.getElementById('camSelect');
    let currentStream = null;

    // --- DETECTARE ---
    async function scanCams() {
        try {
            // Cerem permisiune explicit
            await navigator.mediaDevices.getUserMedia({ video: true });
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            
            camSelect.innerHTML = '';
            videoDevices.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d.deviceId;
                // Căutăm cuvântul "USB" sau "HDMI" în numele camerei
                opt.text = d.label || `Camera ${camSelect.length + 1}`;
                camSelect.appendChild(opt);
            });
            // Selectăm automat ultima cameră (de obicei e cea USB)
            if(camSelect.options.length > 1) camSelect.selectedIndex = camSelect.options.length - 1;
        } catch (e) { alert("Eroare: Permite accesul la cameră în Chrome!"); }
    }

    // --- START ---
    async function start() {
        if(currentStream) currentStream.getTracks().forEach(t => t.stop());
        const constraints = { video: { deviceId: { exact: camSelect.value }, width: 1920, height: 1080 } };
        try {
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = currentStream;
            run();
        } catch (e) {
            // Fallback dacă 1080p eșuează
            currentStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: camSelect.value } } });
            video.srcObject = currentStream;
            run();
        }
    }

    const selfie = new SelfieSegmentation({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}`});
    selfie.setOptions({ modelSelection: 1 });
    selfie.onResults((res) => {
        canvas.width = 1920; canvas.height = 1080;
        ctx.save();
        ctx.filter = `brightness(${document.getElementById('bright').value}%) saturate(${document.getElementById('sat').value}%) contrast(${document.getElementById('cont').value}%)`;
        
        if (document.getElementById('bgType').value === 'image' && bgImg.src && res.segmentationMask) {
            ctx.drawImage(bgImg, 0, 0, 1920, 1080);
            const temp = document.createElement('canvas'); temp.width = 1920; temp.height = 1080;
            const tCtx = temp.getContext('2d');
            tCtx.drawImage(res.image, 0, 0, 1920, 1080);
            tCtx.globalCompositeOperation = 'destination-in';
            tCtx.drawImage(res.segmentationMask, 0, 0, 1920, 1080);
            ctx.drawImage(temp, 0, 0);
        } else {
            ctx.drawImage(video, 0, 0, 1920, 1080);
        }
        ctx.restore();
    });

    function run() { if(video.readyState >= 2) selfie.send({image:video}); requestAnimationFrame(run); }

    document.getElementById('btnScan').onclick = scanCams;
    document.getElementById('btnStart').onclick = start;
    document.getElementById('bgFile').onchange = (e) => { bgImg.src = URL.createObjectURL(e.target.files[0]); };
    document.getElementById('btnCapture').onclick = () => {
        const a = document.createElement('a');
        a.download = `CanonFoto_${Date.now()}.png`;
        a.href = canvas.toDataURL("image/png");
        a.click();
    };
    canvas.ondblclick = () => document.getElementById('sidebar').classList.toggle('hidden');

    // Scanăm la pornire
    window.onload = scanCams;
</script>
</body>
</html>
