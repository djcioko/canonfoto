<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canon Studio Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --accent: #00ff88; }
        body { background: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* Containerul principal care devine Full Screen */
        .viewport { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #000;
        }

        /* Imaginea Video */
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* Schimbă în 'cover' dacă vrei să umple tot ecranul fără margini negre */
        }

        /* Panoul Lateral peste imagine */
        .sidebar { 
            position: absolute; 
            top: 0; left: 0; 
            width: 280px; height: 100%; 
            background: rgba(17, 17, 17, 0.9); 
            padding: 15px; 
            transition: 0.3s; 
            z-index: 1000;
            overflow-y: auto;
        }
        .sidebar.hidden { transform: translateX(-280px); }
        
        /* Butonul SETĂRI - Vizibil Mereu */
        #toggleMenu { 
            position: absolute; 
            bottom: 20px; left: 20px; 
            z-index: 1001; 
            background: var(--accent); color: black; 
            border: none; padding: 12px 20px; 
            border-radius: 5px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .card { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; }
        h3 { font-size: 10px; color: var(--accent); margin: 0 0 10px 0; text-transform: uppercase; }
        #countdown { position: absolute; font-size: 250px; font-weight: bold; color: var(--accent); z-index: 500; text-shadow: 0 0 50px black; pointer-events: none; display: none; }
    </style>
</head>
<body>

<div class="viewport" id="mainArea">
    <button id="toggleMenu">SETĂRI / MENIU</button>
    <div id="countdown">3</div>
    
    <div class="sidebar" id="sidebar">
        <div class="card">
            <h3>1. APARAT FOTO</h3>
            <select id="camSelect" style="width:100%; background:#000; color:white;"></select>
            <button id="startBtn" style="width:100%; margin-top:10px;">START LIVE</button>
        </div>

        <div class="card">
            <h3>2. TELECOMANDĂ</h3>
            <div id="remoteStatus" style="color: #00ff88; font-size: 11px;">STARE: CONECTATĂ</div>
        </div>

        <div class="card">
            <h3>3. TIMER (SECUNDE)</h3>
            <input type="range" id="timerSecs" min="1" max="5" value="3" style="width:100%;">
            <div style="text-align:center; margin-top:5px;">Pauză: <span id="secVal">3</span> sec.</div>
        </div>

        <div class="card">
            <h3>4. IMAGINE</h3>
            <label style="font-size:10px;">Luminos.</label>
            <input type="range" id="br" min="0" max="200" value="100" style="width:100%;">
            <label style="font-size:10px;">Contrast</label>
            <input type="range" id="ct" min="50" max="150" value="100" style="width:100%;">
            <hr>
            <label style="font-size:10px;">Zoom / Stretch</label>
            <select id="fitMode" style="width:100%; background:#000; color:white;">
                <option value="contain">Original (cu margini)</option>
                <option value="cover">Full Screen (Stretch)</option>
            </select>
        </div>

        <button id="capBtn" style="width:100%; padding:15px; background:var(--accent); font-weight:bold; border:none; border-radius:5px;">FĂ POZA</button>
        <button id="fullScreenBtn" style="width:100%; margin-top:10px; padding:8px;">FULL SCREEN ON/OFF</button>
    </div>

    <video id="video" autoplay playsinline></video>
</div>

<canvas id="procCanvas" style="display:none;"></canvas>

<script>
    const v = document.getElementById('video'), sidebar = document.getElementById('sidebar');
    const timerSecs = document.getElementById('timerSecs'), secVal = document.getElementById('secVal');
    const countdown = document.getElementById('countdown'), fitMode = document.getElementById('fitMode');

    // PeerJS Conexiune
    const peer = new Peer('djcioko_canon_booth_2026_xyz');
    peer.on('connection', (conn) => {
        conn.on('data', (data) => { if(data === 'SNAP') startCapture(); });
    });

    // Meniu & Fullscreen
    document.getElementById('toggleMenu').onclick = () => sidebar.classList.toggle('hidden');
    document.getElementById('fullScreenBtn').onclick = () => {
        if (!document.fullscreenElement) document.getElementById('mainArea').requestFullscreen();
        else document.exitFullscreen();
    };

    // Stretch imagine (Aspect Ratio)
    fitMode.onchange = () => v.style.objectFit = fitMode.value;

    // Timer logic
    timerSecs.oninput = () => {
        secVal.innerText = timerSecs.value;
        localStorage.setItem('booth_timer', timerSecs.value);
    };

    function startCapture() {
        let count = parseInt(timerSecs.value);
        countdown.style.display = 'block';
        countdown.innerText = count;
        let interval = setInterval(() => {
            count--;
            if(count > 0) countdown.innerText = count;
            else { clearInterval(interval); countdown.style.display = 'none'; takePhoto(); }
        }, 1000);
    }

    function takePhoto() {
        const can = document.getElementById('procCanvas');
        can.width = v.videoWidth; can.height = v.videoHeight;
        const ctx = can.getContext('2d');
        ctx.filter = v.style.filter;
        ctx.drawImage(v, 0, 0);
        const link = document.createElement('a');
        link.download = `Foto_${Date.now()}.png`;
        link.href = can.toDataURL('image/png');
        link.click();
    }

    document.getElementById('capBtn').onclick = startCapture;
    
    // Filtre & Init
    const applyFX = () => {
        v.style.filter = `brightness(${document.getElementById('br').value}%) contrast(${document.getElementById('ct').value}%)`;
        localStorage.setItem('booth_br', document.getElementById('br').value);
        localStorage.setItem('booth_ct', document.getElementById('ct').value);
    };
    document.getElementById('br').oninput = applyFX;
    document.getElementById('ct').oninput = applyFX;

    async function init() {
        if(localStorage.getItem('booth_br')) document.getElementById('br').value = localStorage.getItem('booth_br');
        if(localStorage.getItem('booth_ct')) document.getElementById('ct').value = localStorage.getItem('booth_ct');
        if(localStorage.getItem('booth_timer')) timerSecs.value = localStorage.getItem('booth_timer');
        secVal.innerText = timerSecs.value;

        const devs = await navigator.mediaDevices.enumerateDevices();
        const cams = devs.filter(d => d.kind === 'videoinput');
        document.getElementById('camSelect').innerHTML = cams.map((c, i) => `<option value="${c.deviceId}">${c.label || 'Camera '+(i+1)}</option>`).join('');
    }
    
    document.getElementById('startBtn').onclick = async () => {
        const s = await navigator.mediaDevices.getUserMedia({video:{deviceId:{exact:document.getElementById('camSelect').value}, width:1920, height:1080}});
        v.srcObject = s;
        applyFX();
    };
    init();
</script>
</body>
</html>
