<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telecomanda Booth</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { 
            background: #000; 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
        }
        #status { 
            font-size: 14px; 
            color: #ff4757; 
            margin-bottom: 30px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-remote { 
            width: 260px; 
            height: 260px; 
            border-radius: 50%; 
            border: 10px solid #333;
            background: none; 
            color: #333; 
            font-size: 28px; 
            font-weight: bold;
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 0 0 rgba(0,255,136,0);
        }
        /* Stil când e conectat */
        .connected .btn-remote {
            border-color: #00ff88;
            color: #00ff88;
            box-shadow: 0 0 40px rgba(0,255,136,0.3);
        }
        .btn-remote:active { 
            transform: scale(0.9);
            background: rgba(0,255,136,0.2);
        }
        .info {
            margin-top: 40px;
            font-size: 10px;
            color: #444;
        }
    </style>
</head>
<body id="body">

    <div id="status">CĂUTARE LAPTOP...</div>
    
    <button id="snapBtn" class="btn-remote" onclick="sendSnap()">FĂ POZA</button>

    <div class="info">ID Sesiune: djcioko_booth_2026</div>

    <script>
        // ID-ul trebuie să fie EXACT ca cel din index.html
        const TARGET_ID = 'djcioko_canon_booth_2026_xyz'; 
        const peer = new Peer(); // Telefonul primește un ID aleatoriu la pornire
        let conn = null;

        // Când PeerJS este gata pe telefon
        peer.on('open', (id) => {
            console.log('ID-ul meu pe telefon este: ' + id);
            tryConnect();
        });

        function tryConnect() {
            document.getElementById('status').innerText = "ÎNCERCARE CONECTARE...";
            
            // Încercăm să ne conectăm la ID-ul laptopului
            conn = peer.connect(TARGET_ID);

            conn.on('open', () => {
                document.getElementById('status').innerText = "CONECTAT LA LAPTOP";
                document.getElementById('status').style.color = "#00ff88";
                document.getElementById('body').classList.add('connected');
                console.log("Conexiune stabilită cu succes!");
            });

            conn.on('error', (err) => {
                console.log("Eroare la conexiune, reîncercăm...");
                setTimeout(tryConnect, 3000);
            });

            // Dacă laptopul închide pagina, reîncercăm conexiunea
            conn.on('close', () => {
                document.getElementById('status').innerText = "LAPTOP DECONECTAT";
                document.getElementById('status').style.color = "#ff4757";
                document.getElementById('body').classList.remove('connected');
                setTimeout(tryConnect, 3000);
            });
        }

        function sendSnap() {
            if (conn && conn.open) {
                conn.send('SNAP');
                // Vibrație scurtă pe Redmi pentru confirmare
                if(navigator.vibrate) navigator.vibrate(80);
            } else {
                alert("Telecomanda nu este conectată la laptop!");
                tryConnect(); // Reîncercăm conectarea dacă a eșuat
            }
        }

        // Dacă PeerJS dă eroare generală (ex: internet picat)
        peer.on('error', (err) => {
            console.error('PeerJS Error:', err);
            setTimeout(() => location.reload(), 5000); // Refresh la pagină după 5 secunde
        });
    </script>
</body>
</html>
